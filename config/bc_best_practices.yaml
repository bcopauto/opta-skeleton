# ---------------------------------------------------------------------------
# Conversion optimization principles
# ---------------------------------------------------------------------------
conversion_optimization:
  core_criteria:
    - criterion: "Speed Access to Information"
      check: "conversion_speed_access"
      priority: critical
      detail: "Minimize redirections, steps, and clicks to conversion"

    - criterion: "Usability / Practicality"
      check: "conversion_usability"
      priority: critical
      detail: "Visibility, ease to copy/paste, features working fast"

    - criterion: "Trust"
      check: "conversion_trust"
      priority: critical
      detail: "Security signals, complete and updated information"

  proven_optimizations:
    - optimization: "Plural in CTAs ('See all promo codes') → better click rate"
      check: "cta_uses_plural"
      applies_to: ["code_page"]

    - optimization: "Codes via search module → better conversion than hidden CTA"
      check: "code_via_search_module"
      applies_to: ["code_page"]

    - optimization: "Show expired codes → increases trust"
      check: "shows_expired_codes"
      applies_to: ["code_page"]

    - optimization: "Card layout on mobile → better than tables for comparators"
      check: "mobile_card_layout"
      applies_to: ["comparator_page", "betting_overview"]

    - optimization: "Bookmaker overview table on desktop → proven winning combination"
      check: "desktop_overview_table"
      applies_to: ["comparator_page", "betting_overview"]

  benchmark_results:
    - test: "Header review summaries"
      result: "23-26% CTP CVR (varies by market)"
      applies_to: ["review_page"]

    - test: "Featured tip with odds comparison in first viewport"
      result: "+123% CVR improvement"
      applies_to: ["timely_content"]

    - test: "Tip pages with contextualized CTAs"
      result: "+711% increase in average FTDs"
      applies_to: ["timely_content"]

    - test: "Betting overview with optimized table"
      result: "+153% CVR improvement"
      applies_to: ["betting_overview"]

# ---------------------------------------------------------------------------
# Featured snippets strategy
# ---------------------------------------------------------------------------
featured_snippets:
  rules:
    - rule: "Monitor SERPs for priority keywords daily"
      check: "fs_daily_serp_monitoring"
      priority: high

    - rule: "Identify competitor Featured Snippets and adapt content to capture them"
      check: "fs_competitor_snippet_analysis"
      priority: high

    - rule: "Use recommended formats: paragraphs, lists, tables, images, or concise answers matching intent"
      check: "fs_content_format_optimized"
      priority: high

    - rule: "Code pages should surface the code directly in meta-title/description for SERP visibility"
      check: "fs_code_in_meta"
      priority: critical
      applies_to: ["code_page"]

# ---------------------------------------------------------------------------
# Google updates awareness
# ---------------------------------------------------------------------------
google_updates_awareness:
  - update: "Site Reputation Abuse"
    check: "aware_site_reputation_abuse"
    priority: critical
    detail: "Impacts affiliate sites — ensure content is not purely third-party hosted for ranking"

  - update: "Helpful Content Update (HCU)"
    check: "aware_helpful_content"
    priority: critical
    detail: "Rewards genuinely helpful content, penalizes content created primarily for SEO"

  - update: "Core updates"
    check: "aware_core_updates"
    priority: high
    detail: "Continuous monitoring and adaptation required"

